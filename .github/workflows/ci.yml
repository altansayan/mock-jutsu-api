name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"

    - name: Install Playwright browsers
      run: playwright install chromium --with-deps

    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=mockjutsu --cov-fail-under=85 --ignore=tests/test_external_validators.py

  validate-external:
    runs-on: ubuntu-latest
    name: "External Validator Tests (Python 3.12)"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install mock-jutsu + validation deps
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[validation]"

    - name: Run external validator tests
      run: |
        python -m pytest tests/test_external_validators.py -v
