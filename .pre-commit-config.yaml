repos:
  - repo: local
    hooks:
      - id: audit-compliance
        name: Mock Jutsu Compliance Audit
        entry: python scripts/audit_compliance.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: strict-compliance
        name: Full System Compliance & Test Check
        entry: python scripts/run_all_checks.py
        language: system
        pass_filenames: false
        stages: [pre-push]
