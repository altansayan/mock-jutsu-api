repos:
  - repo: local
    hooks:
      - id: audit-compliance
        name: Mock Jutsu Compliance Audit
        entry: python scripts/audit_compliance.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: strict-coverage
        name: Strict Test Coverage
        entry: python -m pytest tests/test_generators.py --cov=src --cov-fail-under=85 -p no:capture
        language: python
        pass_filenames: false
        stages: [pre-push]
